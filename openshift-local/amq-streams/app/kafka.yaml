kind: Kafka
apiVersion: kafka.strimzi.io/v1beta2
metadata:
  name: kafka
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV1
    # authorization:
    #   type: simple
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: tls
        port: 9093
        type: internal
        tls: true
        authentication:
          type: tls
      - name: external
        port: 9094
        tls: false
        type: nodeport
        configuration:
          bootstrap:
            nodePort: 32100
          brokers:
            - broker: 0
              nodePort: 32000
              advertisedHost: console-openshift-console.apps-crc.testing
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator: {}
    userOperator: {}
